name: Build and Publish Container Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BASE_MINI_IMAGE: ghcr.io/${{ github.repository_owner }}/we-mp-rss-base-mini
  BASE_FULL_IMAGE: ghcr.io/${{ github.repository_owner }}/we-mp-rss-base-full
  APP_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-base-mini:
    name: Build base-mini
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish base-mini
        uses: docker/build-push-action@v6
        with:
          context: ./Dockerfiles/base-mini
          file: ./Dockerfiles/base-mini/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.BASE_MINI_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=We-MP-RSS minimal base image
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha,scope=base-mini
          cache-to: type=gha,mode=max,scope=base-mini

  build-base-full:
    name: Build base-full
    needs: build-base-mini
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish base-full
        uses: docker/build-push-action@v6
        with:
          context: ./Dockerfiles/base-full
          file: ./Dockerfiles/base-full/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.BASE_FULL_IMAGE }}:latest
          build-args: |
            BASE_MINI_IMAGE=${{ env.BASE_MINI_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=We-MP-RSS full base image
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha,scope=base-full
          cache-to: type=gha,mode=max,scope=base-full

  build-app:
    name: Build application
    needs: build-base-full
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate application image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.description=We-MP-RSS WeChat Official Account RSS service
            org.opencontainers.image.licenses=MIT

      - name: Build and publish application
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_FULL_IMAGE }}:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
